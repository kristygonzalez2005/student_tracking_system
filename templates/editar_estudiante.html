<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar estudiante</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <h2>Actualizar estudiante</h2>

        <a class="btn" href="{{ url_for('ver_estudiantes_web') }}">⬅ Volver</a>

        <form method="POST">

            <h3>Datos del estudiante</h3>

            <label>Documento:</label>
            <input type="text" name="documento" value="{{ estudiante[1] }}" required>

            <label>Nombre:</label>
            <input type="text" name="nombre" value="{{ estudiante[2] }}" required>

            <label>Grado:</label>
            <input type="text" name="grado" value="{{ estudiante[3] }}" required>

            <label>Estado:</label>
            <select name="estado" required>
                <option value="activo" {% if estudiante[4] == 'activo' %}selected{% endif %}>Activo</option>
                <option value="inactivo" {% if estudiante[4] == 'inactivo' %}selected{% endif %}>Inactivo</option>
            </select>

            <hr>

            <h3>Datos del acudiente</h3>

            <label>Nombre del acudiente:</label>
            <input type="text" name="nombre_acudiente" value="{{ estudiante[6] or '' }}" required>

            <label>Teléfono:</label>
            <input type="text" name="telefono" value="{{ estudiante[7] or '' }}" required>

            <label>Parentesco:</label>
            <input type="text" name="parentesco" value="{{ estudiante[8] or '' }}" required>

            <label>Email:</label>
            <input type="email" name="email" value="{{ estudiante[9] or '' }}" required>

            <br><br>
            <button type="submit" class="btn">Guardar cambios</button>
        </form>
    </div>
</body>
</html>
