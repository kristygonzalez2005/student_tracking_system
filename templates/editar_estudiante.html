<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar estudiante</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="dashboard-body">

<div class="main-content">

    <div class="form-container">

        <!-- HEADER -->
        <div class="form-header">
            <div>
                <h2>✏️ Actualizar estudiante</h2>
                <p class="subtitle">Modifica la información del estudiante</p>
            </div>

            <a class="btn-back" href="{{ url_for('ver_estudiantes_web') }}">⬅ Volver</a>
        </div>

        <form method="POST">

            <!-- 🔹 DATOS ESTUDIANTE -->
            <div class="form-section">
                <h3>📘 Datos del estudiante</h3>

                <div class="form-grid">

                    <div class="input-group">
                        <label>Documento</label>
                        <input type="text" name="documento" value="{{ estudiante[1] }}" required>
                    </div>

                    <div class="input-group">
                        <label>Nombre</label>
                        <input type="text" name="nombre" value="{{ estudiante[2] }}" required>
                    </div>

                    <div class="input-group">
                        <label>Grado</label>
                        <input type="text" name="grado" value="{{ estudiante[3] }}" required>
                    </div>

                    <div class="input-group">
                        <label>Estado</label>
                        <select name="estado" class="select-input" required>
                            <option value="activo" {% if estudiante[4] == 'activo' %}selected{% endif %}>Activo</option>
                            <option value="inactivo" {% if estudiante[4] == 'inactivo' %}selected{% endif %}>Inactivo</option>
                        </select>
                    </div>

                </div>
            </div>

            <!-- 🔹 DATOS ACUDIENTE -->
            <div class="form-section">
                <h3>👨‍👩‍👧 Datos del acudiente</h3>

                <div class="form-grid">

                    <div class="input-group">
                        <label>Nombre del acudiente</label>
                        <input type="text" name="nombre_acudiente" value="{{ estudiante[6] or '' }}" required>
                    </div>

                    <div class="input-group">
                        <label>Teléfono</label>
                        <input type="text" name="telefono" value="{{ estudiante[7] or '' }}" required>
                    </div>

                    <div class="input-group">
                        <label>Parentesco</label>
                        <input type="text" name="parentesco" value="{{ estudiante[8] or '' }}" required>
                    </div>

                    <div class="input-group">
                        <label>Email</label>
                        <input type="email" name="email" value="{{ estudiante[9] or '' }}" required>
                    </div>

                </div>
            </div>

            <!-- BOTÓN -->
            <div class="form-footer">
                <button type="submit" class="btn-save">💾 Guardar cambios</button>
            </div>

        </form>

    </div>

</div>

</body>
</html>
