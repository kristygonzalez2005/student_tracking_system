<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Historial</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <h2>Historial de asistencias</h2>
        <a class="btn" href="{{ url_for('panel_coordinador') }}">Volver</a>

        <table>
            <thead>
                <tr>
                    <th>Estudiante</th>
                    <th>Grado</th>
                    <th>Evento</th>
                    <th>Fecha y hora</th>
                </tr>
            </thead>
            <tbody>
                {% for h in historial %}
                <tr>
                    <td>{{ h.nombre }}</td>
                    <td>{{ h.grado }}</td>
                    <td>{{ h.tipo }}</td>
                    <td>{{ h.timestamp }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
